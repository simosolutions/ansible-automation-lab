---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Upgrade all packages
  apt:
    upgrade: dist

- name: Install baseline packages
  apt:
    name:
      - curl
      - wget
      - git
      - vim
      - nano
      - htop
      - unzip
      - ca-certificates
      - python3
      - python3-pip
      - qemu-guest-agent
    state: present

- name: Ensure qemu guest agent is enabled
  systemd:
    name: qemu-guest-agent
    enabled: yes
    state: started
