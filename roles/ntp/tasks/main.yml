- name: Configure external NTP sources (PDC Emulator only)
  ansible.windows.win_shell: |
    w32tm /config /manualpeerlist:"0.za.pool.ntp.org,0x1 1.za.pool.ntp.org,0x1 time.google.com,0x1" /syncfromflags:manual /reliable:yes /update

- name: Restart Windows Time service
  ansible.windows.win_service:
    name: W32Time
    state: restarted

- name: Force time resync
  ansible.windows.win_shell: |
    w32tm /resync /force

- name: Show NTP status (debug)
  ansible.windows.win_shell: |
    w32tm /query /status
  register: ntp_status

- name: Output NTP status
  debug:
    var: ntp_status.stdout_lines
