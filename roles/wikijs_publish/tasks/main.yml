- name: Read network documentation
  ansible.builtin.slurp:
    src: "{{ ansible_env.HOME }}/ansible-output/wiki-docs/network.md"
  register: network_doc

- name: Read inventory documentation
  ansible.builtin.slurp:
    src: "{{ ansible_env.HOME }}/ansible-output/wiki-docs/inventory.md"
  register: inventory_doc

- name: Publish Network page to Wiki.js
  uri:
    url: "{{ vault_wikijs_url }}/graphql"
    method: POST
    headers:
      Authorization: "Bearer {{ vault_wikijs_api_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      query: |
        mutation {
          pages {
            create(
              title: "Network Topology"
              content: "{{ network_doc.content | b64decode | replace('\"','\\\"') }}"
              description: "Auto-generated by Ansible"
              isPrivate: false
              tags: ["ansible","network"]
              locale: "en"
              path: "infrastructure/network-topology"
            ) {
              responseResult {
                succeeded
                message
              }
            }
          }
        }
  register: wiki_network_result

- name: Publish Inventory page to Wiki.js
  uri:
    url: "{{ vault_wikijs_url }}/graphql"
    method: POST
    headers:
      Authorization: "Bearer {{ vault_wikijs_api_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      query: |
        mutation {
          pages {
            create(
              title: "Infrastructure Inventory"
              content: "{{ inventory_doc.content | b64decode | replace('\"','\\\"') }}"
              description: "Auto-generated inventory from Ansible"
              isPrivate: false
              tags: ["ansible","inventory"]
              locale: "en"
              path: "infrastructure/inventory"
            ) {
              responseResult {
                succeeded
                message
              }
            }
          }
        }
  register: wiki_inventory_result

- name: Show Wiki publish result
  debug:
    var: wiki_network_result.json
