1. Password + Account Policy (Default Domain Policy)
- name: Set domain password policy
  ansible.windows.win_shell: |
    net accounts /minpwlen:12 /maxpwage:90 /minpwage:1 /lockoutthreshold:5 /lockoutduration:30
2. Disable legacy authentication (NTLM hardening baseline)
- name: Restrict NTLM (audit mode first)
  ansible.windows.win_regedit:
    path: HKLM\SYSTEM\CurrentControlSet\Control\Lsa\MSV1_0
    name: RestrictSendingNTLMTraffic
    data: 1
    type: dword

(Audit mode safe — not full block yet)

3. SMB hardening (important)
- name: Disable SMB1
  ansible.windows.win_feature:
    name: SMB1Protocol
    state: absent

- name: Enable SMB signing requirement
  ansible.windows.win_regedit:
    path: HKLM\SYSTEM\CurrentControlSet\Services\LanmanServer\Parameters
    name: RequireSecuritySignature
    data: 1
    type: dword
4. LDAP security baseline
- name: Require LDAP signing
  ansible.windows.win_regedit:
    path: HKLM\SYSTEM\CurrentControlSet\Services\NTDS\Parameters
    name: LDAPServerIntegrity
    data: 2
    type: dword
5. Firewall baseline (domain profile)
- name: Enable Windows Firewall (Domain Profile)
  ansible.windows.win_shell: |
    netsh advfirewall set domainprofile state on
    netsh advfirewall set privateprofile state on
    netsh advfirewall set publicprofile state on
6. RDP hardening
- name: Enable NLA for RDP
  ansible.windows.win_regedit:
    path: HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp
    name: UserAuthentication
    data: 1
    type: dword

- name: Restrict RDP to secure level
  ansible.windows.win_regedit:
    path: HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp
    name: MinEncryptionLevel
    data: 3
    type: dword
7. Audit policy (portfolio gold)
- name: Enable advanced audit policy
  ansible.windows.win_shell: |
    auditpol /set /subcategory:"Logon" /success:enable /failure:enable
    auditpol /set /subcategory:"Account Logon" /success:enable /failure:enable
    auditpol /set /subcategory:"Directory Service Access" /success:enable /failure:enable
    auditpol /set /subcategory:"Policy Change" /success:enable /failure:enable
    auditpol /set /subcategory:"Privilege Use" /success:enable /failure:enable
8. Enable command-line auditing (VERY useful)
- name: Enable process command line auditing
  ansible.windows.win_regedit:
    path: HKLM\Software\Microsoft\Windows\CurrentVersion\Policies\System\Audit
    name: ProcessCreationIncludeCmdLine_Enabled
    data: 1
    type: dword
9. Log retention baseline
- name: Increase Security Event Log size
  ansible.windows.win_shell: |
    wevtutil sl Security /ms:268435456
