- name: Install DHCP Server feature (if not already installed)
  ansible.windows.win_feature:
    name: DHCP
    include_management_tools: yes
    state: present

- name: Authorise DHCP server in AD
  ansible.windows.win_shell: |
    Add-DhcpServerInDC

- name: Set DHCP DNS options (global)
  ansible.windows.win_shell: |
    Set-DhcpServerv4OptionValue -DnsServer {{ dhcp_dns_servers | join(",") }}

# ================================
# VLAN 33 Scope
# ================================
- name: Create VLAN33 scope
  community.windows.win_dhcp_lease:
    name: "VLAN33"
    start_range: 192.168.33.100
    end_range: 192.168.33.189
    subnet_mask: 255.255.255.0
    state: present

- name: Set VLAN33 gateway
  ansible.windows.win_shell: |
    Set-DhcpServerv4OptionValue -ScopeId 192.168.33.0 -Router {{ dhcp_router.vlan33 }}

